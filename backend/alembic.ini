# Alembic configuration for SafeAI.
#
# The database URL is intentionally NOT hard-coded here — it is injected at
# runtime from application settings (env-driven) in alembic/env.py, so secrets
# never live in this file and local/CI/prod all use the same code path.

[alembic]
script_location = alembic
prepend_sys_path = .
# Timestamped, slugged migration filenames for readable history.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s
timezone = UTC

[post_write_hooks]
# Auto-format generated migrations with ruff.
hooks = ruff
ruff.type = exec
ruff.executable = ruff
ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
